name: Flutter Android Build

on:
  push:
    branches: [main, master, develop]
    paths:
      - "client/**"
  pull_request:
    branches: [main, master]
    paths:
      - "client/**"
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      # ✅ THE FIX IS HERE — channel only, flutter-version removed entirely
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Set FLUTTER_ROOT
        run: echo "FLUTTER_ROOT=$(flutter sdk-path)" >> $GITHUB_ENV

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('client/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('client/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Create .env file
        run: |
          touch .env
          [ -n "${{ secrets.API_BASE_URL }}" ]      && echo "API_BASE_URL=${{ secrets.API_BASE_URL }}"           >> .env || true
          [ -n "${{ secrets.SUPABASE_URL }}" ]      && echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"           >> .env || true
          [ -n "${{ secrets.SUPABASE_ANON_KEY }}" ] && echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env || true

      - name: Write google-services.json
        run: |
          if [ -n "$GSVC" ]; then
            echo "$GSVC" > android/app/google-services.json
            echo "google-services.json written."
          else
            echo "No GOOGLE_SERVICES_JSON secret — skipping."
          fi
        env:
          GSVC: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Decode and place keystore
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 --decode > android/app/keystore.jks
            cat <<EOF > android/key.properties
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF
            echo "Keystore written."
          else
            echo "Building unsigned."
          fi
        env:
          KS_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Flutter doctor
        run: flutter doctor -v
        continue-on-error: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner (if used)
        run: |
          if grep -q "build_runner" pubspec.yaml; then
            dart run build_runner build --delete-conflicting-outputs
          else
            echo "build_runner not in pubspec — skipping."
          fi

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build debug APK
        run: flutter build apk --debug --verbose

      - name: Build release APK
        run: |
          if [ -f "android/key.properties" ]; then
            echo "Building signed release APK..."
            flutter build apk --release --verbose
          else
            echo "Building unsigned release APK..."
            flutter build apk --release --verbose
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: client/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.sha }}
          path: client/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Report APK size
        run: |
          find build/app/outputs/flutter-apk/ -name "*.apk" \
            -exec sh -c 'echo "$(basename {}) — $(du -sh {} | cut -f1)"' \;
