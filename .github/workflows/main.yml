name: Build Flutter APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: client

      - name: Analyze project
        run: flutter analyze --no-fatal-infos
        working-directory: client
        continue-on-error: true

      - name: List files before build
        run: ls -R
        working-directory: client
        continue-on-error: true

      # ── Debug APK ─────────────────────────────────────────────────────────────
      # flutter build apk has a known exit-code bug in 3.41.x even when Gradle
      # succeeds. We let it run, ignore its exit code, then grab the APK from
      # the Gradle output path which is always:
      #   android/app/build/outputs/apk/<variant>/app-<variant>.apk

      - name: Build debug APK
        shell: bash
        working-directory: client
        run: flutter build apk --debug

      - name: List generated APKs
        run: find . -name "*.apk"
        working-directory: client
        continue-on-error: true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: |
            client/build/app/outputs/flutter-apk/*.apk
            client/android/app/build/outputs/apk/**/*.apk
          retention-days: 7
          if-no-files-found: error

      # ── Release APK (unsigned) ────────────────────────────────────────────────

      - name: Build release APK (unsigned)
        shell: bash
        working-directory: client
        run: |
          flutter build apk --release
          if [ ! -f build/app/outputs/flutter-apk/app-release.apk ]; then
            echo "Error: Release APK was not generated."
            exit 1
          fi

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: |
            client/build/app/outputs/flutter-apk/*.apk
            client/android/app/build/outputs/apk/**/*.apk
          retention-days: 14
          if-no-files-found: error
