name: Flutter Android Build

on:
  push:
    branches: [main, master, develop]
    paths:
      - "client/**"
  pull_request:
    branches: [main, master]
    paths:
      - "client/**"
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: client  # ← points all steps into the client/ folder

    steps:
      # ─────────────────────────────────────────────
      # 1. CHECKOUT
      # ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─────────────────────────────────────────────
      # 2. JAVA (Android toolchain needs JDK 17)
      # ─────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ─────────────────────────────────────────────
      # 3. FLUTTER
      # ─────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.x"   # ← pin to your Flutter version, or use 'stable'
          channel: "stable"
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
          cache-path: "${{ runner.tool_cache }}/flutter/:channel:-:version:-:arch:"

      # ─────────────────────────────────────────────
      # 4. CACHE PUB PACKAGES  (speeds up runs ~40%)
      # ─────────────────────────────────────────────
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            client/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('client/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      # ─────────────────────────────────────────────
      # 5. CACHE GRADLE  (speeds up Android builds ~50%)
      # ─────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('client/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ─────────────────────────────────────────────
      # 6. ENVIRONMENT SECRETS → .env  (optional)
      #    Add any secrets your app needs in GitHub
      #    Settings → Secrets and Variables → Actions
      # ─────────────────────────────────────────────
      - name: Create .env file from secrets
        run: |
          if [ -f ".env.example" ]; then
            cp .env.example .env
          else
            touch .env
          fi
          # Inject secrets if they exist
          [ -n "${{ secrets.API_BASE_URL }}"     ] && echo "API_BASE_URL=${{ secrets.API_BASE_URL }}"         >> .env || true
          [ -n "${{ secrets.SUPABASE_URL }}"     ] && echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"         >> .env || true
          [ -n "${{ secrets.SUPABASE_ANON_KEY }}" ] && echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env || true
          [ -n "${{ secrets.FIREBASE_OPTIONS }}" ] && echo "FIREBASE_OPTIONS=${{ secrets.FIREBASE_OPTIONS }}" >> .env || true

      # ─────────────────────────────────────────────
      # 7. CREATE google-services.json  (if Firebase)
      #    Store the full JSON as a GitHub secret named
      #    GOOGLE_SERVICES_JSON
      # ─────────────────────────────────────────────
      - name: Write google-services.json
        if: ${{ secrets.GOOGLE_SERVICES_JSON != '' }}
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      # ─────────────────────────────────────────────
      # 8. KEYSTORE SETUP (for signed release APK)
      #    Store the base64-encoded keystore as secret
      #    KEYSTORE_BASE64, and also:
      #    KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD
      # ─────────────────────────────────────────────
      - name: Decode and place keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      # ─────────────────────────────────────────────
      # 9. FLUTTER DOCTOR  (sanity check, never fails)
      # ─────────────────────────────────────────────
      - name: Flutter doctor
        run: flutter doctor -v
        continue-on-error: true

      # ─────────────────────────────────────────────
      # 10. GET DEPENDENCIES
      # ─────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ─────────────────────────────────────────────
      # 11. CODE GENERATION  (if project uses build_runner)
      # ─────────────────────────────────────────────
      - name: Run build_runner (if used)
        run: |
          if grep -q "build_runner" pubspec.yaml; then
            dart run build_runner build --delete-conflicting-outputs
          else
            echo "build_runner not used, skipping."
          fi

      # ─────────────────────────────────────────────
      # 12. ANALYZE  (non-blocking — warns but never
      #     kills the build due to lint issues)
      # ─────────────────────────────────────────────
      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      # ─────────────────────────────────────────────
      # 13. BUILD DEBUG APK  (always, no signing needed)
      # ─────────────────────────────────────────────
      - name: Build debug APK
        run: flutter build apk --debug --no-shrink --verbose

      # ─────────────────────────────────────────────
      # 14. BUILD RELEASE APK
      #     Uses --no-shrink to avoid R8/ProGuard issues
      #     on first run. Enable shrink once build is stable.
      # ─────────────────────────────────────────────
      - name: Build release APK
        run: |
          if [ -f "android/key.properties" ]; then
            echo "Signing release APK with keystore..."
            flutter build apk --release --verbose
          else
            echo "No keystore found — building unsigned release APK..."
            flutter build apk --release --no-shrink --verbose
          fi

      # ─────────────────────────────────────────────
      # 15. UPLOAD ARTIFACTS
      # ─────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: client/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.sha }}
          path: client/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ─────────────────────────────────────────────
      # 16. PRINT APK SIZE
      # ─────────────────────────────────────────────
      - name: Report APK size
        run: |
          echo "──────────────────────────────────"
          echo "📦 Build artifacts:"
          find build/app/outputs/flutter-apk/ -name "*.apk" \
            -exec sh -c 'echo "  $(basename {}) — $(du -sh {} | cut -f1)"' \;
          echo "──────────────────────────────────"
