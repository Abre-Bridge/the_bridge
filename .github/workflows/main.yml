name: Build Flutter APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: Flutter version info
        run: flutter --version
        working-directory: client

      - name: Install dependencies
        run: flutter pub get
        working-directory: client

      - name: Run build_runner (if applicable)
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: client
        continue-on-error: true

      - name: Analyze project
        run: flutter analyze --no-fatal-infos
        working-directory: client
        continue-on-error: true

      # ── Debug APK ────────────────────────────────────────────────────────────

      - name: Build debug APK
        run: flutter build apk --debug --verbose
        working-directory: client

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: client/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      # ── Release APK (unsigned) ───────────────────────────────────────────────

      - name: Build release APK (unsigned)
        run: flutter build apk --release --no-shrink --verbose
        working-directory: client

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: client/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
